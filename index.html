<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Dashboard - Steampunk Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23D4AF37' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='50' cy='50' r='40' fill='%23C9A961'/%3E%3Ccircle cx='50' cy='50' r='35' fill='%23E5D4A8'/%3E%3Cline x1='50' y1='15' x2='50' y2='25' stroke='%23000' stroke-width='2'/%3E%3Cline x1='50' y1='75' x2='50' y2='85' stroke='%23000' stroke-width='2'/%3E%3Cline x1='15' y1='50' x2='25' y2='50' stroke='%23000' stroke-width='2'/%3E%3Cline x1='75' y1='50' x2='85' y2='50' stroke='%23000' stroke-width='2'/%3E%3C/svg%3E" alt="Clock Icon" class="header-icon">
            <h1>WORLD CLOCK DASHBOARD</h1>
            <p class="subtitle">STEAMPUNK TIME DIVISION</p>
        </header>

        <!-- Toggle Switch -->
        <div class="toggle-container">
            <label class="toggle-label">ANALOG</label>
            <label class="toggle-switch retro-switch">
                <input type="checkbox" id="displayToggle" class="toggle-input">
                <div class="toggle-track">
                    <div class="toggle-knob retro-knob">
                        <span class="knob-text">O</span>
                    </div>
                </div>
            </label>
            <label class="toggle-label">DIGITAL</label>
        </div>

        <!-- Region Tabs -->
        <div class="region-tabs">
            <button class="region-btn active" data-region="AMER">AMERICAS</button>
            <button class="region-btn" data-region="EMEA">EMEA</button>
            <button class="region-btn" data-region="APJ">APJ</button>
        </div>

        <!-- Clock Grid -->
        <div class="clocks-container">
            <div id="AMER" class="region-grid active-region">
                <!-- AMER Clocks will be dynamically generated -->
            </div>
            <div id="EMEA" class="region-grid">
                <!-- EMEA Clocks will be dynamically generated -->
            </div>
            <div id="APJ" class="region-grid">
                <!-- APJ Clocks will be dynamically generated -->
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <p>INITIALIZING CHRONOMETERS...</p>
    </div>

    <!-- Weather API Attribution -->
    <footer class="footer">
        <p>Weather data provided by Open-Meteo (no API key required) | Last updated: <span id="lastUpdate"></span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
