<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="steampunk.css" />
</head>
<body>
  <header>
    <h1>World Clock</h1>
    <p class="subtitle">Track time across the globe</p>
    <button id="theme-toggle" title="Switch theme">⚙️ Steampunk</button>
    <button id="clock-toggle" title="Switch clock style">🕐 Analog</button>
  </header>

  <main>
    <section class="add-clock">
      <select id="timezone-select">
        <option value="">-- Add a timezone --</option>
      </select>
      <button id="add-btn">Add Clock</button>
    </section>

    <div id="clocks-grid"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
